<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Srijan Das</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: var(--bg-color); color: var(--text-primary); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { max-width: 400px; width: 100%; background: var(--bg-glass); padding: 3rem 2rem; border-radius: 12px; border: 1px solid var(--bg-glass-border); text-align: center; }
        .login-box h2 { margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin <span class="gradient-text">Access</span></h2>
        <form id="login-form">
            <div class="form-group">
                <input type="password" id="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>
            <div id="error-msg" style="color: #ff4d4f; margin-bottom: 1rem; display: none;">Invalid password</div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Login</button>
        </form>
    </div>
    <script src="js/admin.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const res = await window.adminApi.login(password);
                if (res.access_token) {
                    localStorage.setItem('adminToken', res.access_token);
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
