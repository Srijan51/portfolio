<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Srijan Das</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-sidebar">
            <h3 style="margin-bottom: 2rem; text-align: center;">Srijan<span class="gradient-text">.Admin</span></h3>
            <div class="nav-menu">
                <a class="nav-item active" data-tab="projects">📁 Projects</a>
                <a class="nav-item" data-tab="blog">📝 Blog Posts</a>
                <a class="nav-item" data-tab="certifications">📜 Certifications</a>
                <a class="nav-item" data-tab="skills">💻 Skills</a>
                <a class="nav-item" data-tab="messages">✉️ Messages</a>
            </div>
            <button id="logout-btn" class="btn btn-outline" style="width: 100%; margin-top: auto;">Logout</button>
        </div>
        
        <div class="admin-content">
            <div class="dashboard-header">
                <h1 id="page-title">Manage Projects</h1>
                <button id="add-btn" class="btn btn-primary" onclick="adminApp.showAddForm()" style="display: none;">Add New <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:8px"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
            </div>
            
            <div id="form-container" class="admin-card" style="display: none; margin-bottom: 2rem;">
            </div>

            <div id="content-area" class="admin-card">
                <!-- Lists will be rendered here -->
            </div>
        </div>
    </div>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!localStorage.getItem('adminToken')) {
                window.location.href = 'index.html';
            }
            window.adminApp.init();
        });
        
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
